<!DOCTYPE html>
<html lang="en">
<head>
  <title>Active Flights</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">

  <style>
    body {
      background: linear-gradient(180deg, #ecedef 100%, #f1f2f5 100%);
    }

    .page-shell {
      max-width: 1200px;
    }

    .page-hero {
      border: 0;
      border-radius: 1.25rem;
      background: linear-gradient(135deg, rgba(13,110,253,0.08), rgba(255,255,255,0.92));
      box-shadow: 0 0.5rem 1.25rem rgba(0,0,0,0.08);
    }

    .flight-card {
      border: 0;
      border-radius: 1.15rem;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 0.45rem 1rem rgba(0,0,0,0.08);
      transition: transform .15s ease, box-shadow .15s ease;
      cursor: pointer;
      overflow: hidden;
    }

    .flight-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 0.8rem 1.5rem rgba(0,0,0,0.12);
    }

    .flight-card-head {
      background: linear-gradient(180deg, #f7faff 0%, #eef4ff 100%);
      border-bottom: 1px solid rgba(13,110,253,0.08);
    }

    .flight-badge {
      border-radius: 999px;
      padding: 0.35rem 0.7rem;
      font-size: 0.78rem;
      font-weight: 600;
      background: #e8f1ff;
      color: #0d6efd;
    }

    .route-pill {
      border-radius: 999px;
      background: #f8f9fa;
      padding: 0.45rem 0.8rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .meta-label {
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #6c757d;
      margin-bottom: 0.15rem;
    }

    .meta-value {
      font-weight: 600;
      color: #212529;
    }

    .fr24-inline {
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
    }

    .empty-state,
    .loading-card {
      border: 0;
      border-radius: 1.15rem;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 0.45rem 1rem rgba(0,0,0,0.06);
    }

    .skeleton {
      border-radius: 0.75rem;
      background: linear-gradient(90deg, #e9ecef 25%, #f8f9fa 37%, #e9ecef 63%);
      background-size: 400% 100%;
      animation: shimmer 1.4s ease infinite;
    }

    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: 0 0; }
    }
  </style>

  <script src="js/auth.js" defer></script>
  <script src="js/logout.js" defer></script>
  <script src="js/admin-guard.js" defer></script>
  <script src="js/loadNavbar.js" defer></script>
  <script src="js/fetch-flight.js" defer></script>
</head>

<body>
  <div class="container-fluid p-2 bg-primary text-white text-center">
    <h2>ACTIVE FLIGHTS</h2>
  </div>

  <div id="navbar-placeholder"></div>

  <div class="container page-shell mt-3 pb-4">
    <div class="page-hero p-3 p-md-4 mb-3">
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
        <div>
          <h1 class="h3 mb-1">Active Flights</h1>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-primary" id="refreshFlightsBtn" type="button">Refresh</button>
          <a class="btn btn-outline-secondary" href="index.html">Back Home</a>
        </div>
      </div>
    </div>

    <div id="loadingSpinner" class="row g-3">
      <div class="col-md-6 col-xl-4">
        <div class="loading-card p-3">
          <div class="skeleton mb-3" style="height: 22px; width: 55%;"></div>
          <div class="skeleton mb-2" style="height: 18px; width: 100%;"></div>
          <div class="skeleton mb-2" style="height: 18px; width: 85%;"></div>
          <div class="skeleton" style="height: 18px; width: 65%;"></div>
        </div>
      </div>
      <div class="col-md-6 col-xl-4">
        <div class="loading-card p-3">
          <div class="skeleton mb-3" style="height: 22px; width: 55%;"></div>
          <div class="skeleton mb-2" style="height: 18px; width: 100%;"></div>
          <div class="skeleton mb-2" style="height: 18px; width: 85%;"></div>
          <div class="skeleton" style="height: 18px; width: 65%;"></div>
        </div>
      </div>
    </div>

    <div id="flightCards" class="row g-3"></div>
  </div>
</body>
</html>
