<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin - Aircraft Maintenance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">

  <style>
    body {
      background: linear-gradient(180deg, #ecedef 100%, #f1f2f5 100%);
    }

    body.loading {
      cursor: wait;
    }

    .fade-in {
      opacity: 0;
      transform: translateY(2px);
      transition: opacity .18s ease, transform .18s ease;
    }

    .fade-in.ready {
      opacity: 1;
      transform: none;
    }

    .status-text {
      min-height: 1.25rem;
    }

    .section-title {
      letter-spacing: .04em;
      font-size: .78rem;
      text-transform: uppercase;
      color: #6c757d;
      font-weight: 700;
    }

    .hint-card {
      border: 0;
      border-radius: 1rem;
    }
  </style>
</head>

<body>
  <div class="container-fluid p-2 bg-primary text-white text-center">
    <h2 class="mb-0">AIRCRAFT MAINTENANCE</h2>
  </div>

  <div id="navbar-placeholder"></div>

  <div class="container py-4">
    <div class="card shadow-sm fade-in" id="pageCard">
      <div class="card-body">

        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-3">
          <div>
            <h1 class="h4 mb-1">Aircraft Maintenance (Admin)</h1>
            <div class="small text-muted">Update service-hours and compliance dates for each aircraft.</div>
          </div>

          <div class="status-text small text-muted" id="saveStatus"></div>
        </div>

        <div class="row g-3 align-items-end mb-4">
          <div class="col-12 col-md-4">
            <label class="form-label fw-semibold" for="aircraft">Aircraft</label>
            <select id="aircraft" class="form-select">
              <option value="">Select...</option>
              <option>G-AZWS</option>
              <option>G-BPAF</option>
              <option>G-EDGI</option>
              <option>G-AVYL</option>
              <option>G-BULL</option>
            </select>
          </div>

          <div class="col-12 col-md-8 text-md-end">
            <button id="loadBtn" class="btn btn-outline-primary">Load</button>
            <button id="saveBtn" class="btn btn-primary">Save</button>
          </div>
        </div>

        <div class="alert alert-danger d-none mb-4" id="errorBox"></div>

  

        <div class="card shadow-sm">
          <div class="card-body pb-3">
            <div class="row g-3">
              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold" for="tachoNext">Tacho Hours to Next Service</label>
                <input id="tachoNext" type="number" step="0.1" class="form-control" placeholder="e.g. 12.5">
              </div>

              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold" for="flightHoursNext">Flight Hours to Next Service</label>
                <input id="flightHoursNext" type="number" step="0.1" class="form-control" placeholder="e.g. 8.0">
              </div>

              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold" for="serviceAt">Service At Flight Hours</label>
                <input id="serviceAt" type="number" step="0.1" class="form-control" placeholder="e.g. 1234.5 tacho hours">
              </div>

              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold" for="currentTacho">Current Flight Hours</label>
                <input id="currentTacho" type="number" step="0.1" class="form-control" placeholder="e.g. 1234.5 tacho hours">
              </div>

            </div>
          </div>
        </div>


        <div class="card shadow-sm">
          <div class="card-body">
            <div class="row g-3">

              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold" for="arcDue">ARC Due Date</label>
                <input id="arcDue" type="date" class="form-control">
              </div>

              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold" for="insuranceDue">Insurance Due Date</label>
                <input id="insuranceDue" type="date" class="form-control">
              </div>

              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold" for="modWaiverDue">MOD Waiver Due Date</label>
                <input id="modWaiverDue" type="date" class="form-control">
              </div>

              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold" for="annualDue">Annual Due Date</label>
                <input id="annualDue" type="date" class="form-control">
              </div>
            </div>
          </div>
        </div>


      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/logout.js"></script>
  <script src="js/admin-guard.js" defer></script>
  <script src="js/due-soon-badge.js" defer></script>

  <script>
    const API_BASE = "https://dssjr33iy8.execute-api.eu-west-2.amazonaws.com";
    const el = (id) => document.getElementById(id);

    function setBusy(isBusy) {
      document.body.classList.toggle("loading", isBusy);
      el("loadBtn").disabled = isBusy;
      el("saveBtn").disabled = isBusy;
    }

    function showError(msg) {
      const box = el("errorBox");
      box.textContent = msg || "Something went wrong.";
      box.classList.remove("d-none");
    }

    function clearError() {
      const box = el("errorBox");
      box.textContent = "";
      box.classList.add("d-none");
    }

    const statusEl = el("saveStatus");
    function setStatus(msg) {
      if (statusEl) statusEl.textContent = msg || "";
    }

    async function waitForAuthFetch(maxMs = 2500) {
      const start = Date.now();
      while (Date.now() - start < maxMs) {
        if (typeof window.authFetch === "function") return true;
        await new Promise(r => setTimeout(r, 50));
      }
      return false;
    }

    function normalizeReg(value) {
      return (value || "").trim().toUpperCase();
    }

    function getAircraftFromQuery() {
      const params = new URLSearchParams(window.location.search);
      return normalizeReg(params.get("aircraft") || "");
    }

    function fillForm(data) {
      el("tachoNext").value = data?.tachoHoursToNextService ?? "";
      el("flightHoursNext").value = data?.flightHoursToNextService ?? "";
      el("arcDue").value = data?.arcDueDate ?? "";
      el("insuranceDue").value = data?.insuranceDueDate ?? "";
      el("modWaiverDue").value = data?.modWaiverDueDate ?? "";
      el("annualDue").value = data?.annualDueDate ?? "";
    }

    function clearForm() {
      fillForm({});
    }

    function readForm() {
      return {
        tachoHoursToNextService: el("tachoNext").value === "" ? null : Number(el("tachoNext").value),
        flightHoursToNextService: el("flightHoursNext").value === "" ? null : Number(el("flightHoursNext").value),
        arcDueDate: el("arcDue").value || null,
        insuranceDueDate: el("insuranceDue").value || null,
        modWaiverDueDate: el("modWaiverDue").value || null,
        annualDueDate: el("annualDue").value || null
      };
    }

    async function loadAircraft() {
      clearError();

      const aircraft = normalizeReg(el("aircraft").value);
      if (!aircraft) {
        showError("Please select an aircraft first.");
        return;
      }

      setBusy(true);
      setStatus("Loading...");

      try {
        const res = await window.authFetch(`${API_BASE}/admin/aircraft-maintenance?aircraft=${encodeURIComponent(aircraft)}`, {
          method: "GET"
        });

        if (!res || !res.ok) {
          throw new Error(`Load failed (${res?.status || "no response"})`);
        }

        const data = await res.json();
        fillForm(data);
        setStatus("Loaded.");
        setTimeout(() => setStatus(""), 1500);
      } catch (err) {
        console.error(err);
        setStatus("");
        showError(err.message || "Failed to load aircraft maintenance record.");
      } finally {
        setBusy(false);
      }
    }

    async function saveAircraft() {
      clearError();

      const aircraft = normalizeReg(el("aircraft").value);
      if (!aircraft) {
        showError("Please select an aircraft first.");
        return;
      }

      setBusy(true);
      setStatus("Saving...");

      try {
        const payload = {
          aircraft,
          ...readForm()
        };

        const res = await window.authFetch(`${API_BASE}/admin/aircraft-maintenance`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        if (!res || !res.ok) {
          const txt = await res.text().catch(() => "");
          throw new Error(txt || `Save failed (${res?.status || "no response"})`);
        }

        setStatus("Saved.");
        setTimeout(() => setStatus(""), 1500);
        window.showToast?.("Maintenance record saved", { variant: "success" });
      } catch (err) {
        console.error(err);
        setStatus("");
        showError(err.message || "Failed to save aircraft maintenance record.");
      } finally {
        setBusy(false);
      }
    }

    document.addEventListener("DOMContentLoaded", async () => {
      requestAnimationFrame(() => el("pageCard")?.classList.add("ready"));

      const ok = await waitForAuthFetch();
      if (!ok) {
        showError("Authentication helper failed to load.");
        return;
      }

      const isAdmin = await window.isAdminUser?.();
      if (!isAdmin) {
        window.location.href = "index.html";
        return;
      }

      const aircraftFromQuery = getAircraftFromQuery();
      if (aircraftFromQuery) {
        el("aircraft").value = aircraftFromQuery;
        await loadAircraft();
      }
    });

    el("loadBtn").addEventListener("click", loadAircraft);
    el("saveBtn").addEventListener("click", saveAircraft);

    el("aircraft").addEventListener("change", () => {
      clearError();
      setStatus("");
      clearForm();
    });
  </script>

  <script>
    fetch("/partials/navbar.html")
      .then(r => {
        if (!r.ok) throw new Error("Failed to load navbar.html");
        return r.text();
      })
      .then(async html => {
        const mount = document.getElementById("navbar-placeholder");
        if (!mount) return;

        mount.innerHTML = html;

        const userEl = document.getElementById("loggedInUser");
        if (userEl) userEl.textContent = localStorage.getItem("username") || "User";

        const currentPath = window.location.pathname.replace(/\/$/, "");
        document.querySelectorAll(".nav-link").forEach(link => {
          const linkPath = new URL(link.href).pathname.replace(/\/$/, "");
          if (linkPath === currentPath) {
            link.classList.add("active");
            link.setAttribute("aria-current", "page");
          }
        });

        if (window.setupAdminMenu) await window.setupAdminMenu();

        document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => {
          new bootstrap.Tooltip(el);
        });

        window.dispatchEvent(new Event("navbar:loaded"));
      })
      .catch(console.error);
  </script>
</body>
</html>
