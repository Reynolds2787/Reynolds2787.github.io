<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin - Aircraft Maintenance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">

  <style>
    body {
      background: linear-gradient(180deg, #ecedef 100%, #f1f2f5 100%);
    }

    body.loading { cursor: wait; }

    .fade-in {
      opacity: 0;
      transform: translateY(2px);
      transition: opacity .18s ease, transform .18s ease;
    }

    .fade-in.ready {
      opacity: 1;
      transform: none;
    }

    .section-title {
      letter-spacing: .04em;
      font-size: .78rem;
      text-transform: uppercase;
      color: #6c757d;
      font-weight: 700;
    }

    .card {
      border-radius: 1rem;
      margin-bottom: 1rem;
    }

    .log-row {
      border: 1px solid rgba(0,0,0,.08);
      border-radius: 1rem;
      padding: .75rem;
      background: #fff;
    }

    .metric-card {
      border: 1px solid rgba(0,0,0,.06);
      border-radius: 1rem;
      background: linear-gradient(180deg, #fff, #fbfcfd);
      padding: 1rem;
      height: 100%;
    }

    .metric-value {
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1.1;
    }
  </style>
</head>

<body>
  <div class="container-fluid p-2 bg-primary text-white text-center">
    <h2 class="mb-0">AIRCRAFT MAINTENANCE</h2>
  </div>

  <div id="navbar-placeholder"></div>

  <div class="container py-4">
    <div class="card shadow-sm fade-in" id="pageCard">
      <div class="card-body">

        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-3">
          <div>
            <h1 class="h4 mb-1">Aircraft Maintenance (Admin)</h1>
            <div class="small text-muted">Update current values and review maintenance history.</div>
          </div>
          <div class="small text-muted" id="saveStatus"></div>
        </div>

        <div class="alert alert-danger d-none mb-4" id="errorBox"></div>

        <div class="card shadow-sm">
          <div class="card-body">
            <div class="row g-3 align-items-end">
              <div class="col-12 col-md-4">
                <label class="form-label fw-semibold" for="aircraft">Aircraft</label>
                <select id="aircraft" class="form-select">
                  <option value="">Select...</option>
                  <option>G-AZWS</option>
                  <option>G-BPAF</option>
                  <option>G-EDGI</option>
                  <option>G-AVYL</option>
                  <option>G-BULL</option>
                </select>
              </div>

              <div class="col-12 col-md-8 text-md-end d-flex flex-wrap justify-content-md-end gap-2">
                <button id="loadBtn" class="btn btn-outline-primary">Load</button>
                <button id="extendBtn" class="btn btn-outline-warning">Apply 5 Hr Extension</button>
                <button id="saveBtn" class="btn btn-primary">Save</button>
              </div>
            </div>
          </div>
        </div>

        <div class="row g-3">
          <div class="col-12 col-lg-4">
            <div class="metric-card">
              <div class="section-title" id="remainingLabel">Remaining Hours</div>
              <div class="metric-value" id="remainingDisplay">—</div>
            </div>
          </div>

          <div class="col-12 col-lg-4">
            <div class="metric-card">
              <div class="section-title" id="currentLabel">Current Hours</div>
              <div class="metric-value" id="currentDisplay">—</div>
            </div>
          </div>

          <div class="col-12 col-lg-4">
            <div class="metric-card">
              <div class="section-title" id="serviceAtLabel">Service At</div>
              <div class="metric-value" id="serviceAtDisplay">—</div>
            </div>
          </div>
        </div>

        <div class="card shadow-sm mt-3">
          <div class="card-body">
            <div class="section-title mb-3">Current Maintenance Record</div>

            <div class="row g-3">
              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold" for="tachoNext">Remaining Tacho Hours</label>
                <input id="tachoNext" type="number" step="0.1" class="form-control">
              </div>

              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold" for="flightHoursNext">Remaining Flight Hours</label>
                <input id="flightHoursNext" type="number" step="0.1" class="form-control">
              </div>

              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold" for="currentHours">Current Hours</label>
                <input id="currentHours" type="number" step="0.1" class="form-control">
              </div>

              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold" for="serviceAt">Service At</label>
                <input id="serviceAt" type="number" step="0.1" class="form-control">
              </div>

              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold" for="arcDue">ARC Due Date</label>
                <input id="arcDue" type="date" class="form-control">
              </div>

              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold" for="insuranceDue">Insurance Due Date</label>
                <input id="insuranceDue" type="date" class="form-control">
              </div>

              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold" for="modWaiverDue">MOD Waiver Due Date</label>
                <input id="modWaiverDue" type="date" class="form-control">
              </div>

              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold" for="annualDue">Annual Due Date</label>
                <input id="annualDue" type="date" class="form-control">
              </div>
            </div>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
              <div>
                <div class="section-title">Maintenance Log</div>
                <div class="small text-muted">Newest row drives the current “Service At” value.</div>
              </div>
              <button id="addLogRowBtn" class="btn btn-outline-primary btn-sm">Add Log Row</button>
            </div>

            <div id="maintenanceLogRows" class="vstack gap-3"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/logout.js"></script>
  <script src="js/admin-guard.js" defer></script>
  <script src="js/due-soon-badge.js" defer></script>

  <script>
    const API_BASE = "https://dssjr33iy8.execute-api.eu-west-2.amazonaws.com";
    const USES_FLIGHT_HOURS = new Set(["G-AZWS", "G-BULL"]);
    const el = (id) => document.getElementById(id);

    function normalizeReg(value) {
      return (value || "").trim().toUpperCase();
    }

    function setBusy(isBusy) {
      document.body.classList.toggle("loading", isBusy);
      ["loadBtn", "saveBtn", "extendBtn", "addLogRowBtn", "aircraft"].forEach(id => {
        const node = el(id);
        if (node) node.disabled = isBusy;
      });
    }

    function showError(msg) {
      const box = el("errorBox");
      box.textContent = msg || "Something went wrong.";
      box.classList.remove("d-none");
    }

    function clearError() {
      const box = el("errorBox");
      box.textContent = "";
      box.classList.add("d-none");
    }

    function setStatus(msg) {
      el("saveStatus").textContent = msg || "";
    }

    function useFlightMetric() {
      return USES_FLIGHT_HOURS.has(normalizeReg(el("aircraft").value));
    }

    function makeLogRow(row = {}) {
      const wrapper = document.createElement("div");
      wrapper.className = "log-row";
      wrapper.innerHTML = `
        <div class="row g-3 align-items-end">
          <div class="col-12 col-md-2">
            <label class="form-label">Service Date</label>
            <input type="date" class="form-control log-service-date" value="${row.serviceDate || ""}">
          </div>
          <div class="col-12 col-md-3">
            <label class="form-label">Service Type</label>
            <input type="text" class="form-control log-service-type" value="${row.serviceType || ""}">
          </div>
          <div class="col-12 col-md-2">
            <label class="form-label">Next Service</label>
            <input type="number" step="0.1" class="form-control log-next-service" value="${row.nextServiceAt ?? ""}">
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label">Comment</label>
            <input type="text" class="form-control log-comment" value="${row.comment || ""}">
          </div>
          <div class="col-12 col-md-1 d-grid">
            <button type="button" class="btn btn-outline-danger btn-sm remove-log-row">X</button>
          </div>
        </div>
      `;

      wrapper.querySelector(".remove-log-row").addEventListener("click", () => {
        wrapper.remove();
        syncFromLatestLog();
      });

      wrapper.querySelectorAll("input").forEach(input => {
        input.addEventListener("input", syncFromLatestLog);
        input.addEventListener("change", syncFromLatestLog);
      });

      return wrapper;
    }

    function collectLogRows() {
      return [...document.querySelectorAll(".log-row")].map(row => ({
        serviceDate: row.querySelector(".log-service-date")?.value || "",
        serviceType: row.querySelector(".log-service-type")?.value?.trim() || "",
        nextServiceAt: row.querySelector(".log-next-service")?.value === ""
          ? null
          : Number(row.querySelector(".log-next-service")?.value),
        comment: row.querySelector(".log-comment")?.value?.trim() || ""
      }));
    }

    function syncSummaryDisplays() {
      const useFlight = useFlightMetric();
      const remaining = useFlight ? Number(el("flightHoursNext").value || "") : Number(el("tachoNext").value || "");
      const current = Number(el("currentHours").value || "");
      const serviceAt = Number(el("serviceAt").value || "");

      el("remainingLabel").textContent = useFlight ? "Remaining Flight Hours" : "Remaining Tacho Hours";
      el("currentLabel").textContent = useFlight ? "Current Flight Hours" : "Current Tacho Hours";
      el("serviceAtLabel").textContent = useFlight ? "Service At Flight Hours" : "Service At Tacho Hours";

      el("remainingDisplay").textContent = Number.isFinite(remaining) ? remaining.toFixed(1) : "—";
      el("currentDisplay").textContent = Number.isFinite(current) ? current.toFixed(1) : "—";
      el("serviceAtDisplay").textContent = Number.isFinite(serviceAt) ? serviceAt.toFixed(1) : "—";
    }

    function syncFromLatestLog() {
      const rows = collectLogRows()
        .filter(r => r.serviceDate && Number.isFinite(r.nextServiceAt))
        .sort((a, b) => b.serviceDate.localeCompare(a.serviceDate));

      if (rows.length) {
        const latest = rows[0];
        el("serviceAt").value = latest.nextServiceAt.toFixed(1);

        const current = Number(el("currentHours").value || 0);
        const remaining = latest.nextServiceAt - current;

        if (useFlightMetric()) {
          el("flightHoursNext").value = remaining.toFixed(1);
        } else {
          el("tachoNext").value = remaining.toFixed(1);
        }
      }

      syncSummaryDisplays();
    }

    function fillForm(data) {
      el("tachoNext").value = data?.tachoHoursToNextService ?? "";
      el("flightHoursNext").value = data?.flightHoursToNextService ?? "";
      el("currentHours").value = data?.currentHours ?? "";
      el("serviceAt").value = data?.serviceAt ?? "";
      el("arcDue").value = data?.arcDueDate ?? "";
      el("insuranceDue").value = data?.insuranceDueDate ?? "";
      el("modWaiverDue").value = data?.modWaiverDueDate ?? "";
      el("annualDue").value = data?.annualDueDate ?? "";
      syncSummaryDisplays();
    }

    function fillLogRows(items) {
      const host = el("maintenanceLogRows");
      host.innerHTML = "";
      (items || []).forEach(item => host.appendChild(makeLogRow(item)));
      if (!items || !items.length) host.appendChild(makeLogRow());
    }

    function readForm() {
      return {
        tachoHoursToNextService: el("tachoNext").value === "" ? null : Number(el("tachoNext").value),
        flightHoursToNextService: el("flightHoursNext").value === "" ? null : Number(el("flightHoursNext").value),
        currentHours: el("currentHours").value === "" ? null : Number(el("currentHours").value),
        serviceAt: el("serviceAt").value === "" ? null : Number(el("serviceAt").value),
        arcDueDate: el("arcDue").value || null,
        insuranceDueDate: el("insuranceDue").value || null,
        modWaiverDueDate: el("modWaiverDue").value || null,
        annualDueDate: el("annualDue").value || null
      };
    }

    function applyFiveHourExtension() {
      const useFlight = useFlightMetric();
      const currentServiceAt = Number(el("serviceAt").value || 0);
      const newServiceAt = currentServiceAt + 5;

      el("serviceAt").value = newServiceAt.toFixed(1);

      const current = Number(el("currentHours").value || 0);
      const remaining = newServiceAt - current;

      if (useFlight) {
        el("flightHoursNext").value = remaining.toFixed(1);
      } else {
        el("tachoNext").value = remaining.toFixed(1);
      }

      syncSummaryDisplays();
    }

    async function loadAircraft() {
      clearError();

      const aircraft = normalizeReg(el("aircraft").value);
      if (!aircraft) {
        showError("Please select an aircraft first.");
        return;
      }

      setBusy(true);
      setStatus("Loading...");

      try {
        const [recordRes, logRes] = await Promise.all([
          authFetch(`${API_BASE}/admin/aircraft-maintenance?aircraft=${encodeURIComponent(aircraft)}`, {
            method: "GET"
          }),
          authFetch(`${API_BASE}/admin/aircraft-maintenance/log?aircraft=${encodeURIComponent(aircraft)}`, {
            method: "GET"
          })
        ]);

        if (!recordRes.ok) throw new Error("Failed to load maintenance record.");
        if (!logRes.ok) throw new Error("Failed to load maintenance log.");

        const record = await recordRes.json();
        const logData = await logRes.json();

        fillForm(record);
        fillLogRows(logData?.items || []);
        syncFromLatestLog();

        setStatus("Loaded.");
        setTimeout(() => setStatus(""), 1500);
      } catch (err) {
        console.error(err);
        showError(err.message || "Failed to load aircraft.");
      } finally {
        setBusy(false);
      }
    }

    async function saveAircraft() {
      clearError();

      const aircraft = normalizeReg(el("aircraft").value);
      if (!aircraft) {
        showError("Please select an aircraft first.");
        return;
      }

      setBusy(true);
      setStatus("Saving...");

      try {
        const payload = {
          aircraft,
          useFlightHours: useFlightMetric(),
          ...readForm(),
          maintenanceLog: collectLogRows()
            .filter(r => r.serviceDate || r.serviceType || r.comment || Number.isFinite(r.nextServiceAt))
        };

        const res = await authFetch(`${API_BASE}/admin/aircraft-maintenance`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const txt = await res.text().catch(() => "");
          throw new Error(txt || "Failed to save maintenance.");
        }

        setStatus("Saved.");
        setTimeout(() => setStatus(""), 1500);
      } catch (err) {
        console.error(err);
        showError(err.message || "Failed to save aircraft.");
      } finally {
        setBusy(false);
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      requestAnimationFrame(() => el("pageCard")?.classList.add("ready"));

      el("loadBtn").addEventListener("click", loadAircraft);
      el("saveBtn").addEventListener("click", saveAircraft);
      el("extendBtn").addEventListener("click", applyFiveHourExtension);

      el("addLogRowBtn").addEventListener("click", () => {
        el("maintenanceLogRows").appendChild(makeLogRow());
      });

      ["aircraft", "tachoNext", "flightHoursNext", "currentHours", "serviceAt"].forEach(id => {
        el(id).addEventListener("input", syncSummaryDisplays);
        el(id).addEventListener("change", syncSummaryDisplays);
      });
    });
  </script>
</body>
</html>
