<!DOCTYPE html>
<html lang="en">
<head>
  <title>EFM Web App</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">



<style>

  body {
    background: linear-gradient(180deg, #ecedef 100%,#f1f2f5 100%);
    }


  .clickable-row, .clickable-card { cursor: pointer; }

  .table tbody tr.clickable-row:hover > * {
    background-color: rgba(13,110,253,0.06) !important;
  }

  .clickable-card:hover {
    box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15);
    transform: translateY(-1px);
  }

  .fr24-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-left: 8px;
    font-size: 0.85rem;
    color: var(--bs-primary);
    opacity: 0.9;
    white-space: nowrap;
  }

  .fr24-icon {
    display: inline-flex;
    width: 18px;
    height: 18px;
  }
  .fr24-icon svg { width: 18px; height: 18px; }

  .clickable-row:hover .fr24-link,
  .clickable-card:hover .fr24-link {
    opacity: 1;
    text-decoration: underline;
  }

  .skeleton {
    border-radius: .75rem;
    background: linear-gradient(90deg,#e9ecef 25%,#f8f9fa 37%,#e9ecef 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
  }
  @keyframes shimmer { 0% { background-position: 100% 0 } 100% { background-position: 0 0 } }

</style>

<script src="js/auth.js" defer></script>
<script src="js/logout.js" defer></script>
<script src="js/admin-guard.js" defer></script>
<script src="js/due-soon-badge.js" defer></script>
<script src="js/fetch-flight.js" defer></script>
<script src="js/fetch-qnh.js" defer></script>


</head>


<body>

<div class="container-fluid p-2 bg-primary text-white text-center">
  <h2>EFM WEB APP - HOME PAGE</h2>
</div>


<div id="navbar-placeholder"></div>



<div class="container mt-3 pb-3">
  <h2>Quick Access Bar</h2>
  <a href="booking-out-form.html" class="btn btn-success">Book Out</a>
  <a href="my-bookings.html" class="btn btn-primary">My Bookings</a>
</div>


<div class="container-fluid bg-light border-bottom">
  <div class="container py-2">
    <div class="d-flex justify-content-center align-items-center gap-2"
         id="qnhDisplay"
         data-bs-toggle="tooltip"
         data-bs-placement="bottom"
         title="Loading METAR…"
         style="cursor: default;">

      <span class="badge bg-primary">QNH</span>
      <span class="fw-semibold" id="metarStation">—</span>

      <span id="qnhValue" class="fs-5 fw-bold text-primary">
        <span class="spinner-border spinner-border-sm"></span>
      </span>

      <span class="text-muted small">hPa</span>
    </div>
  </div>
</div>



<!-- Aircraft Status Dashboard -->
<div class="container mt-3">
  <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-2">
    <h4 class="mb-0">Aircraft Status</h4>
    <div class="text-muted small">Click an aircraft to open Tech Log</div>
  </div>

  <div id="aircraftDashSkeleton" class="row g-2">
    <div class="col-12 col-md-6 col-lg-4"><div class="skeleton" style="height: 120px;"></div></div>
    <div class="col-12 col-md-6 col-lg-4"><div class="skeleton" style="height: 120px;"></div></div>
    <div class="col-12 col-md-6 col-lg-4"><div class="skeleton" style="height: 120px;"></div></div>
  </div>

  <div id="aircraftDash" class="row g-2 d-none"></div>
</div>

<div class="container mt-2">


  <div id="loadingSpinner" class="text-center my-3">
    <div class="spinner-border text-primary"></div>
    <div>Loading flights...</div>
  </div>

  <div id="flightCards" class="d-block d-md-none"></div>

  <table class="table table-striped table-bordered d-none d-md-table">
    <thead class="table-dark">
      <tr><th>AIRCRAFT</th><th>FROM</th><th>TO</th><th>ETA</th></tr>
    </thead>
    <tbody id="flightsTableBody"></tbody>
  </table>
</div>


<script>
  fetch("/partials/navbar.html")
    .then(r => {
      if (!r.ok) throw new Error("Failed to load navbar.html");
      return r.text();
    })
    .then(async html => {
      const mount = document.getElementById("navbar-placeholder");
      if (!mount) return;

      mount.innerHTML = html;

      // username
      const userEl = document.getElementById("loggedInUser");
      if (userEl) userEl.textContent = localStorage.getItem("username") || "User";

      // highlight current link (NOW the links exist)
      const currentPath = window.location.pathname.replace(/\/$/, "");
      document.querySelectorAll(".nav-link").forEach(link => {
        const linkPath = new URL(link.href).pathname.replace(/\/$/, "");
        if (linkPath === currentPath) {
          link.classList.add("active");
          link.setAttribute("aria-current", "page");
        }
      });

      // admin menu visibility
      if (window.setupAdminMenu) await window.setupAdminMenu();

      // enable tooltips in injected navbar
      document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => {
        new bootstrap.Tooltip(el);
      });

      window.dispatchEvent(new Event("navbar:loaded"));
    })
    .catch(console.error);
</script>

<script></script>




<script>
  // Home dashboard: Aircraft Status (defects + due-soon)
  const DEFECTS_API_BASE = "https://fm5h9wwozc.execute-api.eu-west-2.amazonaws.com";
  const AIRCRAFT_LIST = ["G-AZWS", "G-BPAF", "G-EDGI", "G-AVYL", "G-BULL"];

  function normalizeReg(v) { return (v || "").trim().toUpperCase(); }

  async function waitForAuthFetch(maxMs = 2500) {
    const start = Date.now();
    while (Date.now() - start < maxMs) {
      if (typeof window.authFetch === "function") return true;
      await new Promise(r => setTimeout(r, 50));
    }
    return false;
  }

  function daysUntil(dateStr) {
    if (!dateStr || typeof dateStr !== "string") return null;
    const d = new Date(dateStr + "T00:00:00Z");
    if (Number.isNaN(d.getTime())) return null;
    const now = new Date();
    return Math.floor((d.getTime() - now.getTime()) / (1000 * 60 * 60 * 24));
  }

  function setDashLoading(isLoading) {
    document.getElementById("aircraftDashSkeleton")?.classList.toggle("d-none", !isLoading);
    document.getElementById("aircraftDash")?.classList.toggle("d-none", isLoading);
  }

  async function fetchOpenDefectsSummary(aircraft) {
    const reg = normalizeReg(aircraft);
    const url = new URL(`${DEFECTS_API_BASE}/defects`);
    url.searchParams.set("aircraft", reg);
    url.searchParams.set("status", "open");

    const res = await authFetch(url.toString(), { method: "GET" });
    if (!res.ok) return { aircraft: reg, openCount: 0, grounded: false };

    const data = await res.json();
    const items = (data?.items || []);
    const openCount = items.length;
    const grounded = items.some(d =>
      String(d.severity || "MINOR").toUpperCase() === "GROUNDED" || d.grounded === true
    );

    return { aircraft: reg, openCount, grounded };
  }

  async function fetchDueSoonGrouped() {
    // Reuse your existing config from js/due-soon-badge.js
    const url = window.DUE_SOON_URL;
    if (!url) return new Map();

    const res = await authFetch(url, { method: "GET" });
    if (!res.ok) return new Map();

    const data = await res.json(); // { items: [...] }

    const byAircraft = new Map();
    for (const it of (data.items || [])) {
      const reg = normalizeReg(it.aircraft);
      if (!reg) continue;

      const days = daysUntil(it.nextDueDate);
      if (days === null) continue;

      if (!byAircraft.has(reg)) byAircraft.set(reg, []);
      byAircraft.get(reg).push({
        nextDueDate: it.nextDueDate,
        nextDueType: it.nextDueType,
        days
      });
    }

    for (const arr of byAircraft.values()) arr.sort((a, b) => a.days - b.days);
    return byAircraft;
  }

  function makeAircraftCard({ aircraft, openCount, grounded, dueSoonItems }) {
    const overdueCount = (dueSoonItems || []).filter(x => x.days <= 0).length;
    const due30Count = (dueSoonItems || []).filter(x => x.days > 0 && x.days <= 30).length;

    const href = `aircraft-tech-log.html?aircraft=${encodeURIComponent(aircraft)}&tab=defects`;

    const statusBadge = grounded
      ? `<span class="badge bg-danger">GROUNDED</span>`
      : openCount > 0
        ? `<span class="badge bg-warning text-dark">OPEN DEFECTS</span>`
        : `<span class="badge bg-success">SERVICEABLE</span>`;

    const col = document.createElement("div");
    col.className = "col-12 col-md-6 col-lg-4";

    col.innerHTML = `
      <div class="card shadow-sm clickable-card" role="button" tabindex="0">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start gap-2">
            <div>
              <div class="fw-semibold">${aircraft}</div>
              <div class="small text-muted mt-1">${statusBadge}</div>
            </div>

            <div class="text-end">
              <div class="small text-muted">Open defects</div>
              <div class="fs-5">
                <span class="badge ${openCount > 0 ? "bg-danger" : "bg-secondary"}">${openCount}</span>
              </div>
            </div>
          </div>

          <div class="d-flex flex-wrap gap-1 mt-3">
            <span class="badge ${overdueCount > 0 ? "bg-danger" : "bg-secondary"}">Overdue: ${overdueCount}</span>
            <span class="badge ${due30Count > 0 ? "bg-warning text-dark" : "bg-secondary"}">Due ≤30d: ${due30Count}</span>
          </div>

          <div class="small text-muted mt-2">Open Tech Log →</div>
        </div>
      </div>
    `;

    const card = col.querySelector(".card");
    card.addEventListener("click", () => window.location.href = href);
    card.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") window.location.href = href;
    });

    return col;
  }

  async function loadAircraftDashboard() {
    const dash = document.getElementById("aircraftDash");
    if (!dash) return;

    setDashLoading(true);
    dash.innerHTML = "";

    await waitForAuthFetch();

    const dueMap = await fetchDueSoonGrouped();

    const results = await Promise.all(
      AIRCRAFT_LIST.map(async reg => {
        const defects = await fetchOpenDefectsSummary(reg);
        const dueSoonItems = dueMap.get(defects.aircraft) || [];
        return { ...defects, dueSoonItems };
      })
    );

    for (const r of results) dash.appendChild(makeAircraftCard(r));

    setDashLoading(false);
  }

  document.addEventListener("DOMContentLoaded", () => {
    loadAircraftDashboard();
    setInterval(loadAircraftDashboard, 60000);
  });
</script>

</body>
</html>
