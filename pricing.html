<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin - Pricing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">

  <style>
    body {
      background: linear-gradient(180deg, #ecedef 100%, #f1f2f5 100%);
    }

    body.loading {
      cursor: wait;
    }

    .fade-in {
      opacity: 0;
      transform: translateY(2px);
      transition: opacity .18s ease, transform .18s ease;
    }

    .fade-in.ready {
      opacity: 1;
      transform: none;
    }

    .status-text {
      min-height: 1.25rem;
    }

    .section-title {
      letter-spacing: .04em;
      font-size: .78rem;
      text-transform: uppercase;
      color: #6c757d;
      font-weight: 700;
    }

    .hint-card {
      border: 0;
      border-radius: 1rem;
    }
  </style>
</head>

<body>
  <div class="container-fluid p-2 bg-primary text-white text-center">
    <h2 class="mb-0">PRICING</h2>
  </div>

  <div id="navbar-placeholder"></div>

  <div class="container py-4">
    <div class="card shadow-sm fade-in" id="pageCard">
      <div class="card-body">

        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-3">
          <div>
            <h1 class="h4 mb-1">Pricing Editor</h1>
          </div>

          <div class="status-text small text-muted" id="saveStatus"></div>
        </div>

        <div class="alert alert-danger d-none mb-4" id="errorBox"></div>

        <div class="row g-3 mb-4">
          <div class="col-12 col-lg-6">
            <div class="card shadow-sm hint-card h-100">
              <div class="card-body">
                <div class="section-title">Aircraft Rate</div>
                <div class="small text-muted mt-2">
                  Select an aircraft to update its <strong>hourly rate</strong>.
                </div>
              </div>
            </div>
          </div>


        <div class="card shadow-sm mb-4">
          <div class="card-body">
            <div class="row g-3 align-items-end">
              <div class="col-12 col-md-4">
                <label class="form-label fw-semibold" for="aircraft">Aircraft</label>
                <select id="aircraft" class="form-select">
                  <option value="">Select aircraft...</option>
                  <option>G-AZWS</option>
                  <option>G-BPAF</option>
                  <option>G-EDGI</option>
                  <option>G-AVYL</option>
                  <option>G-BULL</option>
                </select>
              </div>

              <div class="col-12 col-md-8 text-md-end">
                <button id="loadBtn" class="btn btn-outline-primary">Load Pricing</button>
                <button id="saveBtn" class="btn btn-primary">Save Pricing</button>
              </div>
            </div>
          </div>
        </div>

        <div class="row g-4">
          <div class="col-12 col-lg-6">
            <div class="card shadow-sm h-100">
              <div class="card-body">
                <div class="section-title mb-3">Aircraft Pricing</div>

                <div class="mb-3">
                  <label class="form-label fw-semibold" for="hourlyRate">Aircraft Hourly Rate (£)</label>
                  <input id="hourlyRate" type="number" step="0.01" min="0" class="form-control" placeholder="e.g. 180">
                </div>
              </div>
            </div>
          </div>

          <div class="col-12 col-lg-6">
            <div class="card shadow-sm h-100">
              <div class="card-body">
                <div class="section-title mb-3">Global Charges</div>

                <div class="mb-3">
                  <label class="form-label fw-semibold" for="landingFee">Landing Fee (£)</label>
                  <input id="landingFee" type="number" step="0.01" min="0" class="form-control" placeholder="e.g. 6">
                </div>

                <div class="mb-3">
                  <label class="form-label fw-semibold" for="instructorHourly">Instructor Hourly Rate (£)</label>
                  <input id="instructorHourly" type="number" step="0.01" min="0" class="form-control" placeholder="e.g. 40">
                </div>

                <div class="mb-3">
                  <label class="form-label fw-semibold" for="defaultSurcharge">Surcharge Fee (£)</label>
                  <input id="defaultSurcharge" type="number" step="0.01" min="0" class="form-control" placeholder="e.g. 10">
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/logout.js"></script>
  <script src="js/admin-guard.js" defer></script>
  <script src="js/due-soon-badge.js" defer></script>
  <script src="js/loadNavbar.js"></script>

  <script>
    const API_BASE = "https://g7e595crml.execute-api.eu-west-2.amazonaws.com";
    const el = (id) => document.getElementById(id);

    function setBusy(isBusy) {
      document.body.classList.toggle("loading", isBusy);
      el("loadBtn").disabled = isBusy;
      el("saveBtn").disabled = isBusy;
      el("aircraft").disabled = isBusy;
    }

    function showError(msg) {
      const box = el("errorBox");
      box.textContent = msg || "Something went wrong.";
      box.classList.remove("d-none");
    }

    function clearError() {
      const box = el("errorBox");
      box.textContent = "";
      box.classList.add("d-none");
    }

    function setStatus(msg) {
      el("saveStatus").textContent = msg || "";
    }

    async function waitForAuthFetch(maxMs = 2500) {
      const start = Date.now();
      while (Date.now() - start < maxMs) {
        if (typeof window.authFetch === "function") return true;
        await new Promise(r => setTimeout(r, 50));
      }
      return false;
    }

    function normalizeReg(value) {
      return (value || "").trim().toUpperCase();
    }

    function fillAircraftForm(data) {
      el("hourlyRate").value = data?.hourlyRate ?? "";
    }

    function fillGlobalForm(data) {
      el("landingFee").value = data?.defaultLandingFee ?? data?.landingFee ?? "";
      el("instructorHourly").value = data?.instructorHourly ?? "";
      el("defaultSurcharge").value = data?.defaultSurcharge ?? data?.defaultsurcharge ?? "";
    }

    function readAircraftForm() {
      return {
        hourlyRate: el("hourlyRate").value === "" ? null : Number(el("hourlyRate").value)
      };
    }

    function readGlobalForm() {
      return {
        defaultLandingFee: el("landingFee").value === "" ? null : Number(el("landingFee").value),
        instructorHourly: el("instructorHourly").value === "" ? null : Number(el("instructorHourly").value),
        defaultSurcharge: el("defaultSurcharge").value === "" ? null : Number(el("defaultSurcharge").value)
      };
    }

    async function loadPricing() {
      clearError();

      const aircraft = normalizeReg(el("aircraft").value);
      if (!aircraft) {
        showError("Please select an aircraft first.");
        return;
      }

      setBusy(true);
      setStatus("Loading...");

      try {
        const [aircraftRes, globalRes] = await Promise.all([
          window.authFetch(`${API_BASE}/admin/aircraft-pricing?scope=aircraft&aircraft=${encodeURIComponent(aircraft)}`, {
            method: "GET"
          }),
          window.authFetch(`${API_BASE}/admin/aircraft-pricing?scope=global`, {
            method: "GET"
          })
        ]);

        if (!aircraftRes?.ok) {
          throw new Error(`Aircraft pricing load failed (${aircraftRes?.status || "no response"})`);
        }

        if (!globalRes?.ok) {
          throw new Error(`Global pricing load failed (${globalRes?.status || "no response"})`);
        }

        const aircraftData = await aircraftRes.json();
        const globalData = await globalRes.json();

        fillAircraftForm(aircraftData);
        fillGlobalForm(globalData);

        setStatus("Loaded.");
        setTimeout(() => setStatus(""), 1500);
      } catch (err) {
        console.error(err);
        setStatus("");
        showError(err.message || "Failed to load pricing.");
      } finally {
        setBusy(false);
      }
    }

    async function savePricing() {
      clearError();

      const aircraft = normalizeReg(el("aircraft").value);
      if (!aircraft) {
        showError("Please select an aircraft first.");
        return;
      }

      setBusy(true);
      setStatus("Saving...");

      try {
        const aircraftPayload = {
          scope: "aircraft",
          aircraft,
          ...readAircraftForm()
        };

        const globalPayload = {
          scope: "global",
          ...readGlobalForm()
        };

        const [aircraftRes, globalRes] = await Promise.all([
          window.authFetch(`${API_BASE}/admin/aircraft-pricing`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(aircraftPayload)
          }),
          window.authFetch(`${API_BASE}/admin/aircraft-pricing`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(globalPayload)
          })
        ]);

        if (!aircraftRes?.ok) {
          const txt = await aircraftRes.text().catch(() => "");
          throw new Error(txt || `Aircraft save failed (${aircraftRes?.status || "no response"})`);
        }

        if (!globalRes?.ok) {
          const txt = await globalRes.text().catch(() => "");
          throw new Error(txt || `Global save failed (${globalRes?.status || "no response"})`);
        }

        setStatus("Saved.");
        setTimeout(() => setStatus(""), 1500);
      } catch (err) {
        console.error(err);
        setStatus("");
        showError(err.message || "Failed to save pricing.");
      } finally {
        setBusy(false);
      }
    }

    document.addEventListener("DOMContentLoaded", async () => {
      requestAnimationFrame(() => el("pageCard")?.classList.add("ready"));

      const ok = await waitForAuthFetch();
      if (!ok) {
        showError("Authentication helper failed to load.");
        return;
      }

      const isAdmin = await window.isAdminUser?.();
      if (!isAdmin) {
        window.location.href = "index.html";
        return;
      }
    });

    el("loadBtn").addEventListener("click", loadPricing);
    el("saveBtn").addEventListener("click", savePricing);

    el("aircraft").addEventListener("change", () => {
      clearError();
      setStatus("");
      fillAircraftForm({});
    });
  </script>
</body>
</html>
