<!DOCTYPE html>
<html lang="en">
<head>
  <title>EFM Web App</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />

  <style>
    body {
      background: linear-gradient(180deg, #e5e6e8 100%, #d8d9db 100%);
    }

    .page-card {
      border: 0;
      border-radius: 1rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .check-row {
      padding: 0.9rem 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .check-row:last-child {
      border-bottom: 0;
    }

    .section-title {
      letter-spacing: 0.02em;
    }

    .efm-modal .modal-content {
      border: 0;
      border-radius: 1.25rem;
      overflow: hidden;
      background:
        radial-gradient(circle at top right, rgba(13, 110, 253, 0.08), transparent 35%),
        linear-gradient(180deg, #ffffff, #f7f9fc);
      box-shadow:
        0 1rem 2.5rem rgba(0, 0, 0, 0.18),
        0 0.25rem 1rem rgba(13, 110, 253, 0.08);
    }

    .efm-modal .modal-header {
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      padding: 1rem 1.1rem;
      background: rgba(255, 255, 255, 0.86);
    }

    .efm-modal .modal-title {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .efm-modal .modal-body {
      padding: 1.1rem;
    }

    .efm-modal .modal-footer {
      border-top: 1px solid rgba(0, 0, 0, 0.06);
      padding: 1rem 1.1rem;
      background: rgba(255, 255, 255, 0.78);
    }

    .efm-modal-note {
      border-radius: 0.9rem;
      padding: 0.9rem 1rem;
      background: rgba(13, 110, 253, 0.06);
      border: 1px solid rgba(13, 110, 253, 0.08);
      color: #274c77;
      font-size: 0.95rem;
    }

    .efm-modal-summary {
      border: 1px solid rgba(0, 0, 0, 0.07);
      border-radius: 1rem;
      padding: 1rem;
      background: rgba(248, 249, 250, 0.92);
    }

    .efm-modal-label {
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6c757d;
      margin-bottom: 0.25rem;
    }

    .efm-modal-value {
      font-size: 1.05rem;
      font-weight: 700;
      color: #212529;
      line-height: 1.2;
      word-break: break-word;
    }

    .efm-aircraft-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.45rem 0.8rem;
      border-radius: 999px;
      background: #f3f4f6;
      border: 1px solid rgba(0, 0, 0, 0.08);
      font-weight: 700;
    }

    .efm-aircraft-dot {
      width: 0.75rem;
      height: 0.75rem;
      border-radius: 50%;
      background: #198754;
      box-shadow: 0 0 0 0.18rem rgba(25, 135, 84, 0.12);
      flex: 0 0 auto;
    }
  </style>
</head>

<body>
  <div class="container-fluid p-2 bg-primary text-white text-center">
    <h2 class="mb-0 section-title">PRE-FLIGHT CHECKS</h2>
  </div>

  <div class="container py-4">
    <div class="card page-card">
      <div class="card-body p-3 p-md-4">
        <div class="mb-4">
          <h1 class="h4 mb-1">Pilot Outbrief</h1>
          <div class="text-muted small" id="aircraftText">Aircraft: Not selected</div>
        </div>

        <form id="preflightForm">
          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_license">Flying Licence, Ratings and Medical valid</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_license">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_authorised">Flight authorised</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_authorised">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_hotpoop">HOT POOP checked</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_hotpoop">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_met">Latest met checked</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_met">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_notams">NOTAMs & airspace restrictions checked</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_notams">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_limits">Individual limits briefed</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_limits">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_wb">Weight & balance / performance calculated</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_wb">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_defects">Aircraft defects, insurance & hours to next service checked</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_defects">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_fuel">Fuel required for flight confirmed</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_fuel">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_passengers">Passengers briefed / safety brief completed</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_passengers">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_circuits">Kemble circuits booked (01285 771177)</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_circuits">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_ppr">Landaway booked (PPR)</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_ppr">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_fit">Fit to fly / not fatigued</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_fit">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_survive">Dressed to survive</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_survive">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_ooh">Valid OOH</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_ooh">
            </div>
          </div>

          <div class="d-flex flex-column flex-sm-row gap-2 mt-4">
            <button type="button" class="btn btn-success" id="completeBtn">Complete</button>
            <a href="index.html" class="btn btn-outline-secondary">Skip / Return Home</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal fade efm-modal" id="completeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">
            <span>✅</span>
            <span>Pre-flight checks complete</span>
          </h5>
          <button class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <div class="modal-body">
          <div class="efm-modal-note mb-3">
            Remember to update your ETA if you encounter any delays.<br>
            Have a good flight! 
          </div>

          <div class="efm-modal-summary">
            <div class="row g-3">
              <div class="col-6">
                <div class="efm-modal-label">Aircraft</div>
                <div class="efm-modal-value">
                  <span class="efm-aircraft-chip">
                    <span class="efm-aircraft-dot"></span>
                    <span id="completeModalAircraft">—</span>
                  </span>
                </div>
              </div>
              <div class="col-6">
                <div class="efm-modal-label">Status</div>
                <div class="efm-modal-value">Booking Complete</div>
              </div>
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
            Stay here
          </button>
          <button type="button" class="btn btn-success" id="completeModalDoneBtn">
            Done
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    let completeModal = null;

    function getCompleteModal() {
      if (!completeModal) {
        completeModal = new bootstrap.Modal(document.getElementById("completeModal"));
      }
      return completeModal;
    }

    document.addEventListener("DOMContentLoaded", () => {
      const aircraft = getQueryParam("aircraft") || "Not selected";
      document.getElementById("aircraftText").textContent = `Aircraft: ${aircraft}`;
      document.getElementById("completeModalAircraft").textContent = aircraft;

      document.getElementById("completeBtn").addEventListener("click", () => {
        getCompleteModal().show();
      });

      document.getElementById("completeModalDoneBtn").addEventListener("click", () => {
        getCompleteModal().hide();
        window.location.href = "index.html";
      });
    });
  </script>

  <script src="js/admin-guard.js"></script>
</body>
</html>
