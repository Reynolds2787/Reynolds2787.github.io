<!DOCTYPE html>
<html lang="en">
<head>
  <title>EFM Web App</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />

  <style>
    body {
      background: linear-gradient(180deg, #e5e6e8 100%, #d8d9db 100%);
    }

    .page-card {
      border: 0;
      border-radius: 1rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .check-row {
      padding: 0.9rem 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .check-row:last-child {
      border-bottom: 0;
    }

    .section-title {
      letter-spacing: 0.02em;
    }
  </style>
</head>

<body>
  <div class="container-fluid p-2 bg-primary text-white text-center">
    <h2 class="mb-0 section-title">PRE-FLIGHT CHECKS</h2>
  </div>

  <div class="container py-4">
    <div class="card page-card">
      <div class="card-body p-3 p-md-4">
        <div class="mb-4">
          <h1 class="h4 mb-1">Pilot Outbrief</h1>
          <div class="text-muted small" id="aircraftText">Aircraft: Not selected</div>
        </div>

        <form id="preflightForm">
          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_license">Flying Licence, Ratings and Medical valid</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_license">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_authorised">Flight authorised</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_authorised">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_hotpoop">HOT POOP checked</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_hotpoop">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_met">Latest met checked</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_met">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_notams">NOTAMs & airspace restrictions checked</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_notams">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_limits">Individual limits briefed</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_limits">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_wb">Weight & balance / performance calculated</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_wb">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_defects">Aircraft defects, insurance & hours to next service checked</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_defects">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_fuel">Fuel required for flight confirmed</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_fuel">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_passengers">Passengers briefed / safety brief completed</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_passengers">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_circuits">Kemble circuits booked (01285 771177)</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_circuits">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_ppr">Landaway booked (PPR)</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_ppr">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_fit">Fit to fly / not fatigued</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_fit">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_survive">Dressed to survive</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_survive">
            </div>
          </div>

          <div class="check-row d-flex justify-content-between align-items-center gap-3">
            <label class="form-check-label flex-grow-1" for="chk_ooh">Valid OOH</label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="chk_ooh">
            </div>
          </div>

          <div class="d-flex flex-column flex-sm-row gap-2 mt-4">
            <button type="button" class="btn btn-success" id="completeBtn">Complete</button>
            <a href="index.html" class="btn btn-outline-secondary">Skip / Return Home</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    document.addEventListener("DOMContentLoaded", () => {
      const aircraft = getQueryParam("aircraft") || "Not selected";
      document.getElementById("aircraftText").textContent = `Aircraft: ${aircraft}`;

      document.getElementById("completeBtn").addEventListener("click", () => {
        alert("Pre-flight checks completed.");
        window.location.href = "index.html";
      });
    });
  </script>

  <script src="js/admin-guard.js"></script>
</body>
</html>
