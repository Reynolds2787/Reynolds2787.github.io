<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Defects</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">

  <style>
    body {
      background: linear-gradient(180deg, #ecedef 100%, #f1f2f5 100%);
    }

    body.loading { cursor: wait; }

    .fade-in {
      opacity: 0;
      transform: translateY(2px);
      transition: opacity .18s ease, transform .18s ease;
    }

    .fade-in.ready {
      opacity: 1;
      transform: none;
    }

    .skeleton {
      border-radius: .75rem;
      background: linear-gradient(90deg, #e9ecef 25%, #f8f9fa 37%, #e9ecef 63%);
      background-size: 400% 100%;
      animation: shimmer 1.4s ease infinite;
    }

    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: 0 0; }
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
  </style>

  <script src="js/auth.js"></script>
  <script src="js/logout.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/admin-guard.js" defer></script>
  <script src="js/due-soon-badge.js" defer></script>
</head>

<body>
  <div class="container-fluid p-2 bg-primary text-white text-center">
    <h2 class="mb-0">DEFECTS</h2>
  </div>

  <div id="navbar-placeholder"></div>

  <div class="container py-4">
    <div class="card shadow-sm fade-in" id="pageCard">
      <div class="card-body">
        <div class="d-flex flex-wrap align-items-end justify-content-between gap-3 mb-3">
          <div class="d-flex flex-wrap gap-3 align-items-end">
            <div>
              <label class="form-label fw-semibold mb-1" for="aircraftSelect">Aircraft</label>
              <select class="form-select" id="aircraftSelect" style="min-width: 220px;">
                <option value="">Choose...</option>
                <option>G-AZWS</option>
                <option>G-BPAF</option>
                <option>G-EDGI</option>
                <option>G-AVYL</option>
                <option>G-BULL</option>
              </select>
            </div>

            <div>
              <label class="form-label fw-semibold mb-1" for="statusFilter">Show</label>
              <select class="form-select" id="statusFilter" style="min-width: 180px;">
                <option value="open">Open defects</option>
                <option value="all">All defects</option>
              </select>
            </div>

            <div class="text-muted">
              <div class="fw-semibold">Count</div>
              <div class="fs-5" id="defectCount">0</div>
            </div>
          </div>

          <div class="d-flex gap-2">
            <button class="btn btn-primary" id="addBtn" data-bs-toggle="modal" data-bs-target="#addModal" disabled>
              Add defect
            </button>
            <button class="btn btn-outline-secondary" id="doneBtn" type="button">Done</button>
          </div>
        </div>

        <div class="alert alert-danger d-none mb-3" id="errorBox"></div>

        <div id="listSkeleton" class="d-none">
          <div class="skeleton mb-2" style="height: 92px;"></div>
          <div class="skeleton mb-2" style="height: 92px;"></div>
          <div class="skeleton mb-2" style="height: 92px;"></div>
        </div>

        <div id="defectsList" class="vstack gap-2">
          <div class="text-muted">Select an aircraft to view defects.</div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="addModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add defect</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <div class="row g-3">
            <div class="col-12 col-md-3">
              <label class="form-label">Aircraft</label>
              <input class="form-control mono" id="newAircraft" readonly>
            </div>

            <div class="col-12 col-md-3">
              <label class="form-label">Date</label>
              <input class="form-control" id="newDate" type="datetime-local">
            </div>

            <div class="col-12 col-md-3">
              <label class="form-label">Full Name</label>
              <input class="form-control" id="newName" placeholder="e.g. Sam">
            </div>

            <div class="col-12 col-md-3">
              <label class="form-label">Severity</label>
              <select class="form-select" id="newSeverity">
                <option value="MINOR" selected>Minor</option>
                <option value="MAJOR">Major</option>
                <option value="GROUNDED">Aircraft Grounded</option>
              </select>
            </div>

            <div class="col-12">
              <label class="form-label">Defect</label>
              <textarea class="form-control" id="newDefect" rows="3" placeholder="Describe the defect..."></textarea>
            </div>

            <div class="col-12">
              <label class="form-label">Effect on Flight</label>
              <textarea class="form-control" id="newEffect" rows="3" placeholder="Operational effect / limitations..."></textarea>
            </div>
          </div>

          <div class="alert alert-danger d-none mt-3 mb-0" id="addErr"></div>
        </div>

        <div class="modal-footer">
          <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-primary" id="saveBtn">Save</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="actionModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="actionTitle">Update defect</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <div class="row g-3">
            <div class="col-12 col-md-4">
              <label class="form-label">Aircraft</label>
              <input class="form-control mono" id="actAircraft" readonly>
            </div>
            <div class="col-12 col-md-8">
              <label class="form-label">Reported At (key)</label>
              <input class="form-control mono" id="actReportedAt" readonly>
            </div>

            <div class="col-12">
              <label class="form-label" id="notesLabel">Notes</label>
              <textarea class="form-control" id="actNotes" rows="4" placeholder="Enter notes..."></textarea>
              <div class="form-text" id="notesHelp"></div>
            </div>
          </div>

          <div class="alert alert-danger d-none mt-3 mb-0" id="actErr"></div>
        </div>

        <div class="modal-footer">
          <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-primary" id="actConfirmBtn">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://fm5h9wwozc.execute-api.eu-west-2.amazonaws.com";

    const el = (id) => document.getElementById(id);

    function normalizeReg(v) {
      return (v || "").trim().toUpperCase();
    }

    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function getNextUrl() {
      return getQueryParam("next");
    }

    function showError(msg) {
      el("errorBox").textContent = msg;
      el("errorBox").classList.remove("d-none");
    }

    function clearError() {
      el("errorBox").classList.add("d-none");
      el("errorBox").textContent = "";
    }

    function showAddErr(msg) {
      el("addErr").textContent = msg;
      el("addErr").classList.remove("d-none");
    }

    function hideAddErr() {
      el("addErr").classList.add("d-none");
      el("addErr").textContent = "";
    }

    function showActErr(msg) {
      el("actErr").textContent = msg;
      el("actErr").classList.remove("d-none");
    }

    function hideActErr() {
      el("actErr").classList.add("d-none");
      el("actErr").textContent = "";
    }

    function setLoadingList(isLoading) {
      document.body.classList.toggle("loading", isLoading);
      el("listSkeleton").classList.toggle("d-none", !isLoading);
    }

    function toLocalInputValue(d) {
      const pad = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function fmt(iso) {
      const d = new Date(iso);
      return Number.isNaN(d.getTime()) ? (iso || "") : d.toLocaleString();
    }

    function badgeClassForStatus(st) {
      st = (st || "OPEN").toUpperCase();
      if (st === "RECTIFIED") return "bg-success";
      if (st === "DEFERRED") return "bg-warning text-dark";
      return "bg-danger";
    }

    function badgeClassForSeverity(sev) {
      sev = (sev || "MINOR").toUpperCase();
      if (sev === "GROUNDED") return "bg-danger";
      if (sev === "MAJOR") return "bg-warning text-dark";
      return "bg-secondary";
    }

    async function waitForAuthFetch(maxMs = 2500) {
      const start = Date.now();
      while (Date.now() - start < maxMs) {
        if (typeof window.authFetch === "function") return true;
        await new Promise(r => setTimeout(r, 50));
      }
      return false;
    }

    async function currentUserRole() {
      try {
        const ok = await waitForAuthFetch();
        if (!ok) return "";
        const res = await window.authFetch("https://hwjx5fihi5.execute-api.eu-west-2.amazonaws.com/profile", {
          method: "GET"
        });
        if (!res.ok) return "";
        const data = await res.json();
        return (data?.role || "").toLowerCase();
      } catch {
        return "";
      }
    }

    function syncAddModal(reg) {
      el("newAircraft").value = reg || "";
      el("newDate").value = toLocalInputValue(new Date());
      el("newName").value = localStorage.getItem("username") || "";
      el("newSeverity").value = "MINOR";
      el("newDefect").value = "";
      el("newEffect").value = "";
      hideAddErr();
    }

    async function loadDefects(reg) {
      const statusFilter = el("statusFilter").value;
      clearError();
      setLoadingList(true);

      try {
        const ok = await waitForAuthFetch();
        if (!ok) throw new Error("Authentication helper not ready");

        const qs = new URLSearchParams({
          aircraft: reg,
          includeClosed: statusFilter === "all" ? "true" : "false"
        });

        const res = await window.authFetch(`${API_BASE}/defects?${qs.toString()}`, { method: "GET" });
        if (!res.ok) throw new Error("Failed to load defects");

        const data = await res.json();
        const items = Array.isArray(data?.items) ? data.items : [];

        el("defectCount").textContent = items.length;
        renderDefects(items, reg);
      } catch (err) {
        console.error(err);
        showError("Could not load defects.");
        el("defectsList").innerHTML = `<div class="text-muted">Unable to load defects.</div>`;
        el("defectCount").textContent = "0";
      } finally {
        setLoadingList(false);
      }
    }

    async function renderDefects(items, reg) {
      const container = el("defectsList");
      container.innerHTML = "";

      if (!items.length) {
        container.innerHTML = `<div class="alert alert-success mb-0">No defects found for ${reg}.</div>`;
        return;
      }

      const role = await currentUserRole();
      const isAdmin = role === "admin";

      for (const item of items) {
        const status = (item.status || "OPEN").toUpperCase();
        const severity = (item.severity || "MINOR").toUpperCase();

        const card = document.createElement("div");
        card.className = "card shadow-sm";

        const adminActions = isAdmin && status === "OPEN"
          ? `
            <div class="d-flex gap-2 mt-3">
              <button class="btn btn-sm btn-outline-warning defer-btn">Defer</button>
              <button class="btn btn-sm btn-outline-success rectify-btn">Rectify</button>
            </div>
          `
          : "";

        card.innerHTML = `
          <div class="card-body">
            <div class="d-flex flex-wrap justify-content-between gap-2 mb-2">
              <div class="d-flex flex-wrap gap-2">
                <span class="badge ${badgeClassForStatus(status)}">${status}</span>
                <span class="badge ${badgeClassForSeverity(severity)}">${severity}</span>
              </div>
              <div class="text-muted small">${fmt(item.reportedAt)}</div>
            </div>

            <div class="fw-semibold mb-1">${item.defect || "No defect description"}</div>
            <div class="text-muted mb-2">${item.effectOnFlight || "No effect on flight recorded."}</div>

            <div class="small text-muted">
              Reported by: ${item.reportedBy || "Unknown"}
            </div>

            ${adminActions}
          </div>
        `;

        if (isAdmin && status === "OPEN") {
          card.querySelector(".defer-btn")?.addEventListener("click", () => {
            openActionModal("DEFERRED", reg, item.reportedAt);
          });

          card.querySelector(".rectify-btn")?.addEventListener("click", () => {
            openActionModal("RECTIFIED", reg, item.reportedAt);
          });
        }

        container.appendChild(card);
      }
    }

    let pendingAction = null;

    function openActionModal(actionType, aircraft, reportedAt) {
      pendingAction = { actionType, aircraft, reportedAt };

      el("actAircraft").value = aircraft;
      el("actReportedAt").value = reportedAt;
      el("actNotes").value = "";
      hideActErr();

      if (actionType === "DEFERRED") {
        el("actionTitle").textContent = "Defer defect";
        el("notesLabel").textContent = "Deferred notes";
        el("notesHelp").textContent = "Enter details of the deferment / limitations.";
      } else {
        el("actionTitle").textContent = "Rectify defect";
        el("notesLabel").textContent = "Rectification notes";
        el("notesHelp").textContent = "Enter details of the fix carried out.";
      }

      bootstrap.Modal.getOrCreateInstance(el("actionModal")).show();
    }

    async function saveAction() {
      hideActErr();

      if (!pendingAction) return;

      const notes = el("actNotes").value.trim();
      if (!notes) {
        showActErr("Please enter notes.");
        return;
      }

      try {
        const ok = await waitForAuthFetch();
        if (!ok) throw new Error("Authentication helper not ready");

        const res = await window.authFetch(`${API_BASE}/defects/action`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            aircraft: pendingAction.aircraft,
            reportedAt: pendingAction.reportedAt,
            action: pendingAction.actionType,
            notes
          })
        });

        if (!res.ok) throw new Error("Action failed");

        bootstrap.Modal.getInstance(el("actionModal"))?.hide();
        await loadDefects(normalizeReg(el("aircraftSelect").value));
      } catch (err) {
        console.error(err);
        showActErr("Unable to update defect.");
      }
    }

    async function saveDefect() {
      hideAddErr();

      const aircraft = normalizeReg(el("newAircraft").value);
      const reportedAt = el("newDate").value;
      const reportedBy = el("newName").value.trim();
      const severity = el("newSeverity").value;
      const defect = el("newDefect").value.trim();
      const effectOnFlight = el("newEffect").value.trim();

      if (!aircraft || !reportedAt || !reportedBy || !defect) {
        showAddErr("Please complete Aircraft, Date, Full Name and Defect.");
        return;
      }

      try {
        const ok = await waitForAuthFetch();
        if (!ok) throw new Error("Authentication helper not ready");

        const res = await window.authFetch(`${API_BASE}/defects`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            aircraft,
            reportedAt,
            reportedBy,
            severity,
            defect,
            effectOnFlight
          })
        });

        if (!res.ok) throw new Error("Failed to save defect");

        bootstrap.Modal.getInstance(el("addModal"))?.hide();
        await loadDefects(aircraft);
      } catch (err) {
        console.error(err);
        showAddErr("Unable to save defect.");
      }
    }

    document.addEventListener("DOMContentLoaded", async () => {
      requestAnimationFrame(() => el("pageCard")?.classList.add("ready"));

      el("aircraftSelect").addEventListener("change", async () => {
        const reg = normalizeReg(el("aircraftSelect").value);
        el("addBtn").disabled = !reg;
        syncAddModal(reg);

        if (!reg) {
          el("defectsList").innerHTML = `<div class="text-muted">Select an aircraft to view defects.</div>`;
          el("defectCount").textContent = "0";
          return;
        }

        await loadDefects(reg);
      });

      el("statusFilter").addEventListener("change", async () => {
        const reg = normalizeReg(el("aircraftSelect").value);
        if (reg) await loadDefects(reg);
      });

      el("saveBtn").addEventListener("click", saveDefect);
      el("actConfirmBtn").addEventListener("click", saveAction);

      const aircraftFromUrl = normalizeReg(getQueryParam("aircraft") || "");
      if (aircraftFromUrl) {
        el("aircraftSelect").value = aircraftFromUrl;
        el("addBtn").disabled = !aircraftFromUrl;
        syncAddModal(aircraftFromUrl);
        await loadDefects(aircraftFromUrl);
      }

      el("doneBtn").addEventListener("click", () => {
        const next = getNextUrl();

        if (next) {
          const goNext = confirm("Would you like to complete the pre-flight checks now?");
          if (goNext) {
            window.location.href = next;
          } else {
            window.location.href = "index.html";
          }
          return;
        }

        window.location.href = "index.html";
      });
    });
  </script>

  <script>
    fetch("/partials/navbar.html")
      .then(r => {
        if (!r.ok) throw new Error("Failed to load navbar.html");
        return r.text();
      })
      .then(async html => {
        const mount = document.getElementById("navbar-placeholder");
        if (!mount) return;

        mount.innerHTML = html;

        const userEl = document.getElementById("loggedInUser");
        if (userEl) userEl.textContent = localStorage.getItem("username") || "User";

        const currentPath = window.location.pathname.replace(/\/$/, "");
        document.querySelectorAll(".nav-link").forEach(link => {
          const linkPath = new URL(link.href).pathname.replace(/\/$/, "");
          if (linkPath === currentPath) {
            link.classList.add("active");
            link.setAttribute("aria-current", "page");
          }
        });

        if (window.setupAdminMenu) await window.setupAdminMenu();

        document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => {
          new bootstrap.Tooltip(el);
        });

        window.dispatchEvent(new Event("navbar:loaded"));
      })
      .catch(console.error);
  </script>
</body>
</html>
